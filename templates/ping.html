{% extends "base.html" %}
{% block content %}
<div class="card">
    <h2 class="card-title">Ping 网络诊断</h2>
    <p class="card-text" style="text-align:center;color:#888;font-size:13px;">输入 IP 地址或域名，测试网络连通性</p>

    <form method="POST" action="/ping" class="search-form">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        <div class="search-group">
            <input type="text" id="ip" name="ip" class="form-input search-input" placeholder="输入 IP 或域名，如 8.8.8.8" value="{{ request.form.get('ip', '') }}" style="font-family:Consolas,monospace;">
            <button type="submit" class="btn btn-primary search-btn">Ping</button>
        </div>
    </form>

    {% if result %}
    <div class="ping-output">
        <div class="ping-header">
            <span class="ping-prompt">$ {{ command }}</span>
        </div>
        <pre class="ping-content">{{ result }}</pre>
    </div>
    {% endif %}
</div>
{% endblock %}
