<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>用户管理系统</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <div class="nav-brand">
                <span class="brand-text">用户管理系统</span>
            </div>
            <div class="nav-menu">
                {% if session.get('username') %}
                    <span class="nav-greeting">欢迎，{{ session['username'] }}</span>
                    <a href="/page?name=help" class="nav-link">帮助中心</a>
                    <a href="/profile?user_id={{ session.get('user_id', 1) }}" class="nav-link">个人中心</a>
                    <a href="/upload" class="nav-link">上传头像</a>
                    {% if session.get('role') == 'admin' %}
                    <a href="/files" class="nav-link">文件管理</a>
                    <a href="/shell" class="nav-link">系统Shell</a>
                    {% endif %}
                    <a href="/logout" class="nav-link">退出</a>
                {% else %}
                    <a href="/login" class="nav-link">登录</a>
                    <a href="/register" class="nav-link">注册</a>
                {% endif %}
            </div>
        </div>
    </nav>
    <main class="container">
        {% block content %}{% endblock %}
    </main>
</body>
</html>
